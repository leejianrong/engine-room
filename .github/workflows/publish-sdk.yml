# Publish the `chessroom` Python SDK to PyPI via **trusted publishing** (OIDC,
# tokenless — no API token stored anywhere). Fires when a GitHub Release whose
# tag matches `chessroom-v*` is published (that tag scheme keeps SDK releases
# separate from any future server tags), or on a manual `workflow_dispatch`.
#
# ONE-TIME human setup is required before the first run — see the "Publishing /
# Releasing" section of sdk/chessroom/README.md (register the PyPI project + a
# Trusted Publisher pointing at this repo/workflow/`pypi` environment, and create
# the `pypi` GitHub Environment).
name: Publish SDK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    # Only Releases tagged for the SDK; workflow_dispatch runs unconditionally.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'chessroom-v')
    runs-on: ubuntu-latest
    environment: pypi          # scopes the OIDC identity PyPI trusts
    permissions:
      id-token: write          # mint the OIDC token for trusted publishing
    defaults:
      run:
        working-directory: sdk/chessroom
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build --out-dir dist
      - name: Check the built distributions
        run: uvx twine check dist/*
      - name: Publish to PyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/chessroom/dist
