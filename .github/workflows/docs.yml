name: Deploy docs (Zensical → GitHub Pages)

on:
  push:
    branches:
      - main
      - master
  # Build-only validation on PRs (the deploy job below is gated to push/dispatch),
  # so a PR that breaks the docs build fails CI instead of breaking the live site.
  pull_request:
  workflow_dispatch:

# Modern GitHub Pages deployment permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: pip install zensical

      - name: Build site
        run: zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    # Only publish on a push to the default branch (or a manual run) — never on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
