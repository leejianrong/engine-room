# Local stack.
#   docker compose up -d db                     # just Postgres (dev: run app via uv/npm)
#   docker compose --profile app up --build     # whole platform: db + backend + frontend
#   docker compose --profile demo up --build    # ^ plus a looping demo bot (watch a live game)
# (or just `make demo` / `make dev` — see the Makefile.)
#
# Live game state is in-memory in the worker (ADR-0018); Postgres stores durable
# records written at finalization.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: engine_room
      POSTGRES_PASSWORD: engine_room
      POSTGRES_DB: engine_room
    ports:
      # Host 5433 -> container 5432, to avoid colliding with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine_room"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    profiles: ["app", "demo"]
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      ER_DATABASE_URL: postgresql+asyncpg://engine_room:engine_room@db:5432/engine_room
      # CORS default already allows http://localhost:5174 (the frontend origin).
      # Pace the house bot's replies so demo games are watchable move-by-move
      # (local only; production leaves this at the default 0 = instant).
      ER_HOUSE_MOVE_DELAY_SECONDS: "0.5"
    ports:
      - "8001:8001"

  frontend:
    profiles: ["app", "demo"]
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:8001"
    depends_on:
      - backend
    ports:
      - "5174:80"

  # A random-mover bot that keeps starting games so there's always something live
  # to watch. Reuses the backend image (has chess + websockets via uvicorn[standard]).
  # Waits for the backend to finish migrating (its /health only answers after that),
  # mints a real key straight from the DB, then loops games. Shares the backend's
  # default ER_API_KEY_PEPPER so the minted key authenticates.
  demo-bot:
    profiles: ["demo"]
    build: ./server
    depends_on:
      - backend
    environment:
      ER_DATABASE_URL: postgresql+asyncpg://engine_room:engine_room@db:5432/engine_room
    command:
      - sh
      - -c
      - |
        until uv run python -c "import urllib.request; urllib.request.urlopen('http://backend:8001/health')" >/dev/null 2>&1; do
          echo "demo-bot: waiting for backend…"; sleep 1;
        done
        KEY=$$(uv run python -m engine_room.devtools.mint_bot --quiet)
        echo "demo-bot: minted a dev key; starting games (watch at http://localhost:5174)"
        exec uv run python -m engine_room.devtools.demo_bot --api backend:8001 --web localhost:5174 --token "$$KEY" --loop

volumes:
  pgdata:
